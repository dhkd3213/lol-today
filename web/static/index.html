<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>HOWLING ABYSS LEDGER · 칼바람 정산소</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Nanum+Myeongjo:wght@400;700;800&family=IBM+Plex+Sans+KR:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    /* Hextech palette */
    --navy-0: #05101f;       /* deepest */
    --navy-1: #0a1428;       /* main bg */
    --navy-2: #0f2235;       /* card bg */
    --navy-3: #162f4a;       /* elevated card */
    --line: #1e3a5f;         /* subtle borders */
    --line-gold: #463714;    /* gold-tinted border */

    --gold: #c8aa6e;         /* primary accent */
    --gold-bright: #f0e6d2;  /* radiant gold text */
    --gold-dim: #785a28;     /* muted gold */
    --teal: #0ac8b9;         /* hextech cyan */
    --teal-dim: #0397a7;

    --text: #cdbe91;
    --text-bright: #f0e6d2;
    --text-dim: #5b5a56;
    --text-mid: #a09b8c;

    --win: #0ac8b9;
    --lose: #e84057;
    --champ-neutral: #3d6a82;
  }

  * { box-sizing: border-box; }

  html, body { background: var(--navy-0); }

  body {
    font-family: "IBM Plex Sans KR", "IBM Plex Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-weight: 400;
    color: var(--text);
    margin: 0;
    padding: 32px 24px 80px;
    max-width: 1140px;
    margin-inline: auto;
    position: relative;
    background:
      radial-gradient(ellipse 900px 600px at 50% -10%, rgba(10, 200, 185, 0.08), transparent 60%),
      radial-gradient(ellipse 1200px 800px at 80% 100%, rgba(200, 170, 110, 0.05), transparent 60%),
      linear-gradient(180deg, var(--navy-0) 0%, var(--navy-1) 50%, var(--navy-0) 100%);
    background-attachment: fixed;
    min-height: 100vh;
  }

  /* 전역 노이즈 오버레이 */
  body::before {
    content: '';
    position: fixed; inset: 0;
    pointer-events: none;
    opacity: 0.035;
    z-index: 0;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/></svg>");
  }

  body > * { position: relative; z-index: 1; }

  /* ==================== TYPOGRAPHY ==================== */

  .brand {
    display: flex; align-items: center; gap: 16px;
    margin: 0 0 4px;
    padding: 0 0 20px;
    border-bottom: 1px solid var(--line-gold);
    position: relative;
  }
  .brand-user {
    margin-left: auto;
    display: flex; flex-direction: column; align-items: flex-end;
    gap: 3px;
    padding: 9px 16px 9px 18px;
    background: linear-gradient(180deg, rgba(22, 47, 74, 0.55), rgba(10, 20, 40, 0.3));
    border: 1px solid var(--line);
    border-top: 1px solid var(--gold-dim);
    clip-path: polygon(8px 0, 100% 0, 100% calc(100% - 8px), calc(100% - 8px) 100%, 0 100%, 0 8px);
    min-width: 180px;
    opacity: 0;
    animation: fadeUp 0.5s ease 200ms forwards;
  }
  .brand-user .label {
    font-family: "Cinzel", serif;
    font-weight: 500;
    font-size: 9px;
    letter-spacing: 0.28em;
    color: var(--gold);
    text-transform: uppercase;
  }
  .brand-user .name {
    font-family: "Nanum Myeongjo", serif;
    font-weight: 700;
    font-size: 14px;
    color: var(--gold-bright);
    letter-spacing: -0.01em;
  }
  .brand-user .tag {
    color: var(--text-mid);
    font-weight: 400;
    margin-left: 2px;
  }
  .brand::after {
    content: '';
    position: absolute; left: 0; right: 0; bottom: -1px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold) 30%, var(--gold) 70%, transparent);
    opacity: 0.5;
  }
  .brand .gem {
    width: 18px; height: 18px;
    background: linear-gradient(135deg, var(--teal), var(--teal-dim));
    transform: rotate(45deg);
    box-shadow: 0 0 20px rgba(10, 200, 185, 0.6), inset 0 0 8px rgba(255, 255, 255, 0.3);
    flex-shrink: 0;
  }
  .brand-text {
    display: flex; flex-direction: column; gap: 2px;
  }
  .brand-kr {
    font-family: "Nanum Myeongjo", serif;
    font-weight: 800;
    font-size: 26px;
    letter-spacing: -0.01em;
    color: var(--gold-bright);
    line-height: 1;
  }
  .brand-en {
    font-family: "Cinzel", serif;
    font-weight: 500;
    font-size: 11px;
    letter-spacing: 0.35em;
    color: var(--gold);
    text-transform: uppercase;
  }

  .section-title {
    font-family: "Cinzel", "Nanum Myeongjo", serif;
    font-weight: 600;
    font-size: 13px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--gold);
    margin: 28px 0 12px;
    display: flex; align-items: center; gap: 10px;
  }
  .section-title::before {
    content: '◆';
    color: var(--teal);
    font-size: 10px;
  }
  .section-title .kr {
    font-family: "Nanum Myeongjo", serif;
    font-weight: 700;
    font-size: 15px;
    letter-spacing: 0;
    color: var(--gold-bright);
    text-transform: none;
  }

  .muted { color: var(--text-mid); font-size: 13px; }

  /* ==================== TOOLBAR ==================== */

  .toolbar {
    display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
    margin: 20px 0 12px;
    padding: 14px 18px;
    background: linear-gradient(180deg, rgba(22, 47, 74, 0.6), rgba(10, 20, 40, 0.8));
    border: 1px solid var(--line);
    border-top: 1px solid var(--gold-dim);
    border-bottom: 1px solid var(--gold-dim);
    clip-path: polygon(12px 0, 100% 0, 100% calc(100% - 12px), calc(100% - 12px) 100%, 0 100%, 0 12px);
    position: relative;
  }
  .toolbar::before, .toolbar::after {
    content: ''; position: absolute;
    width: 6px; height: 6px;
    background: var(--gold);
    transform: rotate(45deg);
  }
  .toolbar::before { top: -3px; left: 20px; }
  .toolbar::after { bottom: -3px; right: 20px; }

  /* ==================== BUTTONS ==================== */

  button {
    font-family: "IBM Plex Sans KR", sans-serif;
    background: linear-gradient(180deg, var(--gold), var(--gold-dim));
    color: var(--navy-0);
    border: 1px solid var(--gold-bright);
    padding: 9px 18px;
    font-weight: 600;
    font-size: 13px;
    letter-spacing: 0.08em;
    cursor: pointer;
    text-transform: uppercase;
    position: relative;
    transition: all 0.18s ease;
    clip-path: polygon(8px 0, 100% 0, 100% calc(100% - 8px), calc(100% - 8px) 100%, 0 100%, 0 8px);
  }
  button:hover {
    background: linear-gradient(180deg, var(--gold-bright), var(--gold));
    box-shadow: 0 0 16px rgba(200, 170, 110, 0.4);
  }
  button:active { transform: translateY(1px); }
  button:disabled { opacity: 0.35; cursor: not-allowed; filter: grayscale(0.5); }

  button.ghost {
    background: transparent;
    color: var(--gold);
    border: 1px solid var(--gold-dim);
    font-weight: 500;
  }
  button.ghost:hover {
    color: var(--gold-bright);
    border-color: var(--gold);
    background: rgba(200, 170, 110, 0.08);
    box-shadow: inset 0 0 20px rgba(200, 170, 110, 0.12);
  }

  button.danger {
    background: transparent;
    color: var(--lose);
    border: 1px solid rgba(232, 64, 87, 0.4);
    font-size: 11px;
    padding: 6px 12px;
  }
  button.danger:hover { background: rgba(232, 64, 87, 0.1); border-color: var(--lose); box-shadow: none; }

  /* ==================== MATCH LIST ==================== */

  .match-list { display: grid; gap: 6px; }

  .match {
    display: grid; grid-template-columns: 32px 100px 1fr 90px 88px 220px;
    align-items: center; gap: 18px;
    padding: 12px 18px;
    background: linear-gradient(90deg, rgba(15, 34, 53, 0.9) 0%, rgba(10, 20, 40, 0.6) 100%);
    border: 1px solid var(--line);
    border-left: 3px solid var(--line);
    cursor: pointer;
    transition: all 0.15s ease;
    position: relative;
    opacity: 0;
    animation: fadeUp 0.5s ease forwards;
  }
  .match:hover {
    border-color: var(--gold-dim);
    border-left-color: var(--gold);
    background: linear-gradient(90deg, rgba(22, 47, 74, 0.95) 0%, rgba(15, 34, 53, 0.7) 100%);
  }
  .match.aram { border-left-color: var(--teal-dim); }
  .match.aram:hover { border-left-color: var(--teal); }

  .match .time {
    font-family: "JetBrains Mono", monospace;
    font-size: 11px;
    color: var(--text-mid);
    letter-spacing: 0.04em;
  }
  .match .champ-label {
    font-family: "Nanum Myeongjo", serif;
    font-weight: 700;
    color: var(--text-bright);
  }

  .win { color: var(--win); font-weight: 600; font-family: "Cinzel", serif; letter-spacing: 0.15em; font-size: 12px; }
  .lose { color: var(--lose); font-weight: 600; font-family: "Cinzel", serif; letter-spacing: 0.15em; font-size: 12px; }

  .chip {
    display: inline-block;
    padding: 3px 10px;
    background: rgba(10, 200, 185, 0.08);
    border: 1px solid rgba(10, 200, 185, 0.25);
    color: var(--teal);
    font-family: "Cinzel", serif;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.14em;
    text-transform: uppercase;
  }

  /* ==================== TEAM TABLE ==================== */

  .team-table {
    width: 100%; border-collapse: collapse; margin-bottom: 12px;
    background: linear-gradient(180deg, var(--navy-2), var(--navy-1));
    border: 1px solid var(--line);
    border-top: 1px solid var(--gold-dim);
  }
  .team-table th, .team-table td {
    padding: 10px 14px;
    text-align: left;
    border: none;
  }
  .team-table thead {
    background: rgba(10, 20, 40, 0.8);
  }
  .team-table th {
    font-family: "Cinzel", serif;
    font-weight: 600;
    font-size: 10px;
    letter-spacing: 0.22em;
    color: var(--gold);
    text-transform: uppercase;
    border-bottom: 1px solid var(--gold-dim);
  }
  .team-table tbody tr { border-top: 1px solid var(--line); }
  .team-table tbody tr:hover { background: rgba(200, 170, 110, 0.04); }
  .team-table tr.me {
    background: linear-gradient(90deg, rgba(10, 200, 185, 0.08), transparent);
    border-left: 2px solid var(--teal);
  }
  .team-table tr.me:hover { background: linear-gradient(90deg, rgba(10, 200, 185, 0.14), transparent); }

  .champ { display: flex; align-items: center; gap: 10px; }
  .champ img {
    width: 28px; height: 28px;
    border: 1px solid var(--gold-dim);
    filter: contrast(1.05) saturate(1.1);
  }
  .champ-name {
    font-family: "Nanum Myeongjo", serif;
    font-weight: 700;
    color: var(--text-bright);
  }

  /* ==================== CARDS ==================== */

  .result-card {
    padding: 18px 22px;
    background: linear-gradient(180deg, var(--navy-2), var(--navy-1));
    border: 1px solid var(--line);
    border-top: 1px solid var(--gold-dim);
    margin-bottom: 14px;
    position: relative;
  }
  .result-card::before, .result-card::after {
    content: ''; position: absolute;
    width: 6px; height: 6px;
    background: var(--gold);
    transform: rotate(45deg);
  }
  .result-card::before { top: -3px; left: 24px; }
  .result-card::after { top: -3px; right: 24px; }

  /* 최종 정산 전용 hero 변형 */
  .result-card.final {
    padding: 28px 32px 32px;
    margin-bottom: 20px;
    border: 1px solid var(--gold-dim);
    border-top: 2px solid var(--gold);
    border-bottom: 2px solid var(--gold);
    background:
      radial-gradient(ellipse 600px 240px at 50% 0%, rgba(200, 170, 110, 0.14), transparent 70%),
      radial-gradient(ellipse 600px 240px at 50% 100%, rgba(10, 200, 185, 0.06), transparent 70%),
      linear-gradient(180deg, #162f4a 0%, #0f2235 60%, #0a1428 100%);
    box-shadow:
      0 0 48px rgba(200, 170, 110, 0.18),
      0 8px 32px rgba(0, 0, 0, 0.55),
      inset 0 0 0 1px rgba(200, 170, 110, 0.08);
    clip-path: polygon(16px 0, calc(100% - 16px) 0, 100% 16px, 100% calc(100% - 16px), calc(100% - 16px) 100%, 16px 100%, 0 calc(100% - 16px), 0 16px);
  }
  .result-card.final::before, .result-card.final::after {
    width: 10px; height: 10px;
    background: var(--gold-bright);
    box-shadow: 0 0 10px rgba(240, 230, 210, 0.6);
  }
  .result-card.final::before { top: -5px; left: 32px; }
  .result-card.final::after  { top: -5px; right: 32px; }
  .final-corners {
    position: absolute; bottom: -5px; left: 0; right: 0;
    pointer-events: none;
  }
  .final-corners::before, .final-corners::after {
    content: ''; position: absolute; bottom: 0;
    width: 10px; height: 10px;
    background: var(--gold-bright);
    transform: rotate(45deg);
    box-shadow: 0 0 10px rgba(240, 230, 210, 0.6);
  }
  .final-corners::before { left: 32px; }
  .final-corners::after { right: 32px; }

  /* 최종 정산 전용 section-title */
  .section-title.hero {
    font-size: 16px;
    letter-spacing: 0.3em;
    margin: 36px 0 16px;
  }
  .section-title.hero::before {
    content: '◆';
    color: var(--gold-bright);
    font-size: 14px;
    text-shadow: 0 0 10px rgba(240, 230, 210, 0.6);
  }
  .section-title.hero .kr {
    font-size: 22px;
    color: var(--gold-bright);
    text-shadow: 0 0 20px rgba(200, 170, 110, 0.35);
    margin-left: 8px;
  }

  /* 최종 정산 안의 net-row 강조 */
  .result-card.final .net-group-head {
    font-size: 17px;
    padding: 10px 0 8px;
  }
  .result-card.final .net-group-head .net-group-sub {
    font-size: 12px;
    color: var(--gold);
  }
  .result-card.final .net-row {
    padding: 9px 0;
    font-size: 15px;
  }
  .result-card.final .net-row .amount {
    font-size: 16px;
    font-weight: 600;
    letter-spacing: 0.03em;
  }
  .result-card.final .net-row:not(.zero) .amount {
    color: var(--gold-bright);
    text-shadow: 0 0 12px rgba(200, 170, 110, 0.25);
  }

  .rank-row {
    display: grid;
    grid-template-columns: 60px 28px 1fr 200px;
    align-items: center; gap: 12px;
    padding: 10px 0;
    border-bottom: 1px dashed rgba(121, 90, 40, 0.2);
  }
  .rank-row:last-child { border-bottom: none; }
  .rank-num {
    font-family: "Cinzel", serif;
    font-weight: 700;
    font-size: 18px;
    color: var(--text-mid);
    letter-spacing: 0.05em;
  }
  .rank-num.r1 { color: var(--gold); text-shadow: 0 0 12px rgba(200, 170, 110, 0.5); }
  .rank-num.last { color: var(--lose); }

  .transfer {
    padding: 8px 0;
    color: var(--text-mid);
    font-size: 13px;
    font-family: "JetBrains Mono", monospace;
    letter-spacing: -0.01em;
  }

  /* ==================== NET GROUPS ==================== */

  .net-group { margin-bottom: 18px; }
  .net-group:last-child { margin-bottom: 0; }
  .net-group-head {
    font-family: "Nanum Myeongjo", serif;
    font-size: 15px;
    font-weight: 700;
    color: var(--gold-bright);
    padding: 8px 0 8px;
    border-bottom: 1px solid var(--gold-dim);
    margin-bottom: 6px;
    display: flex; justify-content: space-between; align-items: baseline;
  }
  .net-group-head .net-group-sub {
    font-family: "JetBrains Mono", monospace;
    font-size: 11px;
    color: var(--gold);
    font-weight: 500;
    letter-spacing: 0.1em;
  }
  .net-row {
    display: grid; grid-template-columns: 1fr 28px 1fr 140px;
    align-items: center; padding: 7px 0;
    border-top: 1px solid rgba(30, 58, 95, 0.3);
    font-size: 14px;
  }
  .net-row:first-child { border-top: none; }
  .net-row strong {
    font-family: "Nanum Myeongjo", serif;
    font-weight: 700;
    color: var(--text-bright);
  }
  .net-row .amount {
    font-family: "JetBrains Mono", monospace;
    text-align: right;
    color: var(--gold-bright);
    font-weight: 500;
    letter-spacing: 0.02em;
  }
  .net-row.zero { color: var(--text-dim); }
  .net-row.zero strong { color: var(--text-dim); font-weight: 400; }
  .net-row.zero .amount { color: var(--text-dim); }
  .net-row.in-group {
    grid-template-columns: 24px 1fr 140px;
    padding: 6px 0;
    border: none;
    border-top: 1px solid rgba(30, 58, 95, 0.15);
  }
  .net-row.in-group:first-of-type { border-top: none; }

  /* ==================== FRIENDS SCREEN ==================== */

  .friend-row {
    display: grid; grid-template-columns: 1.3fr 0.8fr 1fr 100px;
    align-items: center; gap: 12px;
    padding: 11px 18px;
    border-top: 1px solid var(--line);
  }
  .friend-row:first-child { border-top: none; }
  .friend-row.head {
    font-family: "Cinzel", serif;
    font-size: 10px;
    color: var(--gold);
    letter-spacing: 0.22em;
    text-transform: uppercase;
    padding: 10px 18px;
    border-bottom: 1px solid var(--gold-dim);
    background: rgba(10, 20, 40, 0.5);
  }
  .friend-row code {
    font-family: "JetBrains Mono", monospace;
    font-size: 11px;
    color: var(--gold-dim);
  }
  .friend-row .name-kr {
    font-family: "Nanum Myeongjo", serif;
    font-weight: 700;
    color: var(--text-bright);
  }
  .add-friend-form {
    display: grid; grid-template-columns: 1fr 1fr auto;
    gap: 10px; padding: 16px 18px;
  }
  .add-friend-form input {
    background: var(--navy-0);
    border: 1px solid var(--line);
    border-bottom: 1px solid var(--gold-dim);
    color: var(--text-bright);
    padding: 10px 12px;
    font-family: "IBM Plex Sans KR", sans-serif;
    font-size: 14px;
    outline: none;
    transition: border-color 0.15s;
  }
  .add-friend-form input:focus {
    border-color: var(--gold);
    box-shadow: 0 0 0 1px rgba(200, 170, 110, 0.2);
  }

  /* ==================== BALANCE & ZERO ==================== */

  .big-zero {
    font-family: "Cinzel", serif;
    font-size: 44px;
    font-weight: 700;
    color: var(--gold);
    text-align: center;
    padding: 28px 0 20px;
    letter-spacing: 0.1em;
    text-shadow: 0 0 30px rgba(200, 170, 110, 0.4);
  }
  .big-zero small {
    display: block;
    font-family: "IBM Plex Sans KR", sans-serif;
    font-size: 12px;
    color: var(--text-mid);
    font-weight: 300;
    margin-top: 10px;
    letter-spacing: 0;
    text-shadow: none;
  }
  .balance-row {
    display: grid; grid-template-columns: 1fr 140px;
    align-items: center; padding: 9px 0;
    border-top: 1px solid rgba(30, 58, 95, 0.3);
    font-size: 14px;
  }
  .balance-row:first-child { border-top: none; }
  .balance-row > span:first-child {
    font-family: "Nanum Myeongjo", serif;
    font-weight: 700;
    color: var(--text-bright);
  }
  .balance-pos, .balance-neg, .balance-zero {
    font-family: "JetBrains Mono", monospace;
    text-align: right;
    font-weight: 500;
    letter-spacing: 0.02em;
  }
  .balance-pos { color: var(--teal); }
  .balance-neg { color: var(--lose); }
  .balance-zero { color: var(--text-dim); }

  /* ==================== DAMAGE BAR ==================== */

  .dmg-cell {
    display: flex; flex-direction: column;
    gap: 5px; min-width: 160px;
  }
  .dmg-num {
    font-family: "JetBrains Mono", monospace;
    font-variant-numeric: tabular-nums;
    font-size: 13px;
    color: var(--text-bright);
    letter-spacing: 0.02em;
  }
  .dmg-bar {
    height: 7px;
    background: var(--navy-0);
    border: 1px solid rgba(30, 58, 95, 0.6);
    overflow: hidden;
    position: relative;
  }
  .dmg-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--teal-dim), var(--teal));
    box-shadow: 0 0 8px rgba(10, 200, 185, 0.4);
    position: relative;
    transition: width 0.6s ease;
  }
  .dmg-fill::after {
    content: '';
    position: absolute; top: 0; right: 0; bottom: 0; width: 2px;
    background: var(--gold-bright);
    box-shadow: 0 0 6px var(--gold-bright);
  }
  .dmg-fill.first {
    background: linear-gradient(90deg, var(--gold-dim), var(--gold), var(--gold-bright));
    box-shadow: 0 0 10px rgba(200, 170, 110, 0.6);
  }
  .dmg-fill.last {
    background: linear-gradient(90deg, #7a1f2a, var(--lose));
    box-shadow: 0 0 8px rgba(232, 64, 87, 0.4);
  }

  /* ==================== MISC ==================== */

  pre.summary {
    background: var(--navy-0);
    padding: 18px 20px;
    border: 1px solid var(--line);
    border-left: 2px solid var(--gold-dim);
    white-space: pre-wrap;
    font-family: "JetBrains Mono", "Nanum Myeongjo", monospace;
    font-size: 12px;
    line-height: 1.65;
    color: var(--text);
  }

  .error {
    background: linear-gradient(180deg, rgba(232, 64, 87, 0.15), rgba(232, 64, 87, 0.05));
    border: 1px solid rgba(232, 64, 87, 0.4);
    border-top: 1px solid var(--lose);
    padding: 12px 18px;
    color: #ffb6bd;
    font-family: "Nanum Myeongjo", serif;
  }

  label.toggle {
    display: inline-flex; align-items: center; gap: 8px;
    cursor: pointer;
    font-size: 13px;
    color: var(--text);
  }
  input[type=checkbox] {
    accent-color: var(--gold);
    cursor: pointer;
    width: 15px; height: 15px;
  }

  /* 모든 행/카드에 스태거 페이드인 */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .match:nth-child(1)  { animation-delay: 0ms; }
  .match:nth-child(2)  { animation-delay: 30ms; }
  .match:nth-child(3)  { animation-delay: 60ms; }
  .match:nth-child(4)  { animation-delay: 90ms; }
  .match:nth-child(5)  { animation-delay: 120ms; }
  .match:nth-child(6)  { animation-delay: 150ms; }
  .match:nth-child(7)  { animation-delay: 180ms; }
  .match:nth-child(8)  { animation-delay: 210ms; }
  .match:nth-child(n+9) { animation-delay: 240ms; }
  .result-card { opacity: 0; animation: fadeUp 0.55s ease forwards; }
  .result-card:nth-child(1) { animation-delay: 0ms; }
  .result-card:nth-child(2) { animation-delay: 60ms; }
  .result-card:nth-child(3) { animation-delay: 120ms; }
  .result-card:nth-child(4) { animation-delay: 180ms; }
  .result-card:nth-child(5) { animation-delay: 240ms; }
</style>
</head>
<body>
  <header class="brand">
    <div class="gem" aria-hidden="true"></div>
    <div class="brand-text">
      <div class="brand-en">Howling Abyss · Ledger</div>
      <div class="brand-kr">칼바람 딜량 내기 정산소</div>
    </div>
    <div class="brand-user" id="brand-user" hidden>
      <span class="label">Summoner</span>
      <span><span class="name" id="brand-user-name"></span><span class="tag" id="brand-user-tag"></span></span>
    </div>
  </header>
  <div id="app"></div>

  <script src="/static/app.js"></script>
</body>
</html>
