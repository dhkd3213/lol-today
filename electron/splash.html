<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Nanum+Myeongjo:wght@400;700&display=swap');
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: transparent;
    font-family: "Nanum Myeongjo", serif;
    color: #e8d9a9;
    -webkit-user-select: none; user-select: none;
    overflow: hidden;
  }
  .card {
    width: 100%; height: 100%;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: linear-gradient(180deg, #0a1420 0%, #13233a 100%);
    border: 1px solid #c8aa6e;
    box-shadow: 0 0 40px rgba(200, 170, 110, 0.3) inset, 0 10px 60px rgba(0,0,0,0.6);
    -webkit-app-region: drag;
  }
  .title {
    font-family: "Cinzel", serif;
    font-size: 22px;
    letter-spacing: 0.22em;
    color: #c8aa6e;
    text-transform: uppercase;
    text-shadow: 0 0 20px rgba(200, 170, 110, 0.5);
  }
  .sub {
    margin-top: 10px;
    font-size: 13px;
    color: #8ba3c3;
    letter-spacing: 0.04em;
  }
  .dots {
    margin-top: 32px;
    display: flex; gap: 10px;
  }
  .dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: #c8aa6e;
    opacity: 0.3;
    animation: pulse 1.4s ease-in-out infinite;
  }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes pulse {
    0%, 100% { opacity: 0.2; transform: scale(0.8); }
    50% { opacity: 1; transform: scale(1.2); }
  }
  .version {
    position: absolute; bottom: 14px;
    font-family: "JetBrains Mono", monospace;
    font-size: 10px;
    color: #4d6380;
    letter-spacing: 0.1em;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="title">HOWLING ABYSS</div>
    <div class="sub">딜량 내기 정산기 · 서버 기동 중</div>
    <div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
    <div class="version">starting backend…</div>
  </div>
</body>
</html>
